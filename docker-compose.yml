services:
  postgres:
    image: postgres:17-alpine
    container_name: ai-hub-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: aihub
      POSTGRES_PASSWORD: aihubpass
      POSTGRES_DB: aihub
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - ai_hub_net

  backend:
    build: ./backend
    container_name: ai-hub-backend
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 3001
      DATABASE_URL: postgresql://aihub:aihubpass@postgres:5432/aihub?schema=public
      JWT_SECRET: change-me-long-random-secret
      ADMIN_USERNAME: admin
      ADMIN_PASSWORD: change-me-strong-password
    depends_on:
      - postgres
    networks:
      - ai_hub_net

  frontend:
    build: ./frontend
    container_name: ai-hub-frontend
    restart: unless-stopped
    depends_on:
      - backend
    networks:
      - ai_hub_net

  nginx:
    image: nginx:alpine
    container_name: ai-hub-nginx
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - frontend
      - backend
    networks:
      - ai_hub_net

volumes:
  postgres_data:

networks:
  ai_hub_net:
