server {
 listen 80; server_name _; client_max_body_size 20m;
 location /api/ { proxy_pass http://ai-hub-backend:3001/api/; proxy_http_version 1.1; proxy_set_header Host $host; proxy_set_header X-Real-IP $remote_addr; }
 location / { proxy_pass http://ai-hub-frontend:80/; proxy_http_version 1.1; proxy_set_header Host $host; proxy_set_header X-Real-IP $remote_addr; }
}
